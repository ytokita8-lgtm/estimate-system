<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法規チェック — かんたん版</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ee;
  --white: #ffffff;
  --ink: #16140f;
  --gray1: #f0ede6;
  --gray2: #e0ddd4;
  --gray3: #b8b4a8;
  --gray4: #7a7568;
  --green: #1e7a44;
  --green-bg: #eaf5ef;
  --green-border: #a8dbb8;
  --amber: #c07010;
  --amber-bg: #fdf5e6;
  --amber-border: #f0c870;
  --red: #c03028;
  --red-bg: #fdf0ee;
  --red-border: #f0a8a0;
  --blue: #1848a0;
  --blue-bg: #eef2fc;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.08);
  --shadow: 0 2px 16px rgba(0,0,0,0.10);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.14);
  --r: 8px;
  --r2: 14px;
  --r3: 20px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;}

/* ── MAP（全画面） ── */
#map{position:fixed;inset:0;z-index:0;}

/* ── TOP BAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:56px;
  background:rgba(22,20,15,0.92);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;padding:0 20px;gap:14px;
}
.tb-logo{font-size:15px;font-weight:900;color:white;letter-spacing:0.02em;}
.tb-logo span{font-size:11px;font-weight:400;color:rgba(255,255,255,0.45);margin-left:6px;font-family:'JetBrains Mono',monospace;}

/* 住所検索バー */
.search-bar{
  flex:1;max-width:440px;position:relative;
}
.search-input{
  width:100%;height:36px;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:20px;
  color:white;font-size:13px;
  padding:0 42px 0 16px;
  font-family:'Noto Sans JP',sans-serif;
  outline:none;transition:all 0.2s;
}
.search-input::placeholder{color:rgba(255,255,255,0.4);}
.search-input:focus{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.4);}
.search-go{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:rgba(255,255,255,0.5);
  cursor:pointer;font-size:16px;padding:4px;transition:color 0.15s;
}
.search-go:hover{color:white;}
.search-drop{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:white;border-radius:var(--r2);
  box-shadow:var(--shadow-lg);overflow:hidden;
  display:none;z-index:200;
}
.search-item{
  padding:10px 16px;cursor:pointer;
  border-bottom:1px solid var(--gray1);font-size:13px;
  transition:background 0.1s;
}
.search-item:hover{background:var(--gray1);}
.search-item:last-child{border-bottom:none;}
.si-name{font-weight:500;color:var(--ink);}
.si-addr{font-size:11px;color:var(--gray4);margin-top:1px;}

.tb-hint{
  margin-left:auto;
  font-size:11px;color:rgba(255,255,255,0.45);
  display:flex;align-items:center;gap:6px;
  font-family:'JetBrains Mono',monospace;
}
.tb-pulse{
  width:8px;height:8px;border-radius:50%;
  background:#4aba6a;flex-shrink:0;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}
.tb-pulse.loading{background:#f0c040;animation:spin-pulse 0.8s linear infinite;}
@keyframes spin-pulse{0%{opacity:1;}50%{opacity:0.3;}100%{opacity:1;}}
.tb-pulse.err{background:#e05050;animation:none;}

/* ── STEP GUIDE（中央下） ── */
.step-guide{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:100;
  background:rgba(22,20,15,0.88);
  backdrop-filter:blur(12px);
  border-radius:28px;
  padding:12px 24px;
  display:flex;align-items:center;gap:12px;
  color:white;font-size:13px;
  box-shadow:var(--shadow-lg);
  transition:all 0.35s cubic-bezier(0.34,1.2,0.64,1);
  white-space:nowrap;
}
.sg-icon{font-size:20px;}
.sg-text{font-weight:500;}
.sg-sub{font-size:11px;color:rgba(255,255,255,0.5);margin-top:1px;}

/* ── PIN アニメーション ── */
.custom-pin{transition:transform 0.2s;}
.pin-ripple{
  position:absolute;
  width:60px;height:60px;
  border-radius:50%;
  border:2px solid var(--red);
  animation:ripple 1.5s ease-out forwards;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
}
@keyframes ripple{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0.8;}
  100%{transform:translate(-50%,-50%) scale(1.5);opacity:0;}
}

/* ── 取得中オーバーレイ ── */
.fetching-badge{
  position:fixed;top:72px;left:50%;transform:translateX(-50%);
  z-index:200;
  background:white;
  border-radius:20px;
  padding:10px 20px;
  font-size:12px;font-weight:500;
  color:var(--amber);
  box-shadow:var(--shadow);
  display:none;align-items:center;gap:8px;
  border:1px solid var(--amber-border);
}
.fetching-badge.show{display:flex;}
.fb-spin{
  width:14px;height:14px;border-radius:50%;
  border:2px solid var(--amber-border);
  border-top-color:var(--amber);
  animation:sp 0.7s linear infinite;
  flex-shrink:0;
}
@keyframes sp{to{transform:rotate(360deg);}}

/* ── ZONE CARD（取得後、地図上に表示） ── */
.zone-card{
  position:fixed;top:68px;left:16px;
  z-index:100;
  background:white;
  border-radius:var(--r2);
  box-shadow:var(--shadow-lg);
  width:240px;
  overflow:hidden;
  transform:translateY(-8px);opacity:0;
  transition:all 0.35s cubic-bezier(0.34,1.2,0.64,1);
  pointer-events:none;
}
.zone-card.show{transform:translateY(0);opacity:1;pointer-events:all;}
.zc-head{
  padding:12px 16px;
  display:flex;align-items:center;gap:10px;
}
.zc-icon{font-size:22px;}
.zc-label{font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--gray4);text-transform:uppercase;margin-bottom:2px;}
.zc-name{font-size:14px;font-weight:900;line-height:1.2;}
.zc-params{
  display:grid;grid-template-columns:1fr 1fr;
  border-top:1px solid var(--gray1);
}
.zc-param{
  padding:8px 12px;
  border-right:1px solid var(--gray1);
  text-align:center;
}
.zc-param:nth-child(2n){border-right:none;}
.zc-param:nth-child(3),.zc-param:nth-child(4){border-top:1px solid var(--gray1);}
.zcp-label{font-size:9px;color:var(--gray4);font-family:'JetBrains Mono',monospace;margin-bottom:2px;}
.zcp-val{font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--ink);}
.zc-ai-note{
  padding:6px 12px;
  background:var(--amber-bg);
  border-top:1px solid var(--amber-border);
  font-size:10px;color:var(--amber);
  display:flex;align-items:center;gap:4px;
}

/* ── INPUT PANEL（右側フローティング） ── */
.input-panel{
  position:fixed;top:68px;right:16px;
  z-index:100;
  background:white;
  border-radius:var(--r2);
  box-shadow:var(--shadow-lg);
  width:280px;
  transform:translateX(16px);opacity:0;
  transition:all 0.4s cubic-bezier(0.34,1.2,0.64,1);
  pointer-events:none;
  overflow:hidden;
}
.input-panel.show{transform:translateX(0);opacity:1;pointer-events:all;}
.ip-head{
  padding:14px 18px 10px;
  border-bottom:1px solid var(--gray1);
  display:flex;align-items:center;gap:8px;
}
.ip-title{font-size:13px;font-weight:700;}
.ip-sub{font-size:11px;color:var(--gray4);margin-top:1px;}
.ip-body{padding:14px 18px;}
.ip-field{margin-bottom:14px;}
.ip-field:last-child{margin-bottom:0;}
.ip-label{
  font-size:11px;font-weight:700;color:var(--gray4);
  margin-bottom:6px;display:flex;align-items:center;gap:6px;
}
.ip-label-icon{font-size:14px;}

/* Big number inputs */
.big-input-wrap{
  display:flex;align-items:center;gap:8px;
}
.big-input{
  flex:1;
  height:48px;
  background:var(--gray1);
  border:2px solid var(--gray2);
  border-radius:var(--r);
  font-size:22px;font-weight:700;
  font-family:'JetBrains Mono',monospace;
  color:var(--ink);
  padding:0 14px;
  outline:none;
  transition:all 0.15s;
  text-align:right;
}
.big-input:focus{border-color:var(--ink);background:white;}
.big-input::placeholder{color:var(--gray3);font-size:16px;font-weight:400;}
.big-unit{font-size:13px;color:var(--gray4);font-weight:500;white-space:nowrap;}

/* Sub inputs (smaller) */
.sub-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sub-input-wrap{position:relative;}
.sub-label{font-size:10px;color:var(--gray4);margin-bottom:3px;}
.sub-input{
  width:100%;height:38px;
  background:var(--gray1);border:1.5px solid var(--gray2);
  border-radius:var(--r);font-size:15px;font-weight:700;
  font-family:'JetBrains Mono',monospace;
  color:var(--ink);padding:0 8px;outline:none;transition:all 0.15s;
  text-align:right;
}
.sub-input:focus{border-color:var(--ink);background:white;}
.sub-unit{font-size:10px;color:var(--gray4);text-align:right;margin-top:2px;}

/* Run button */
.run-btn{
  width:100%;height:52px;margin-top:14px;
  background:var(--ink);color:white;
  border:none;border-radius:var(--r2);
  font-size:15px;font-weight:700;
  font-family:'Noto Sans JP',sans-serif;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all 0.2s;
  letter-spacing:0.02em;
}
.run-btn:hover{background:#2a2820;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.2);}
.run-btn:active{transform:translateY(0);}
.run-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}

/* ── RESULT PANEL（下からスライドアップ） ── */
.result-panel{
  position:fixed;bottom:0;left:0;right:0;
  z-index:150;
  background:white;
  border-radius:var(--r2) var(--r2) 0 0;
  box-shadow:0 -4px 40px rgba(0,0,0,0.15);
  transform:translateY(100%);
  transition:transform 0.45s cubic-bezier(0.32,0.9,0.4,1);
  max-height:75vh;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.result-panel.show{transform:translateY(0);}

.rp-handle{
  width:36px;height:4px;background:var(--gray2);
  border-radius:2px;margin:10px auto 0;flex-shrink:0;cursor:pointer;
}
.rp-head{
  padding:12px 20px 14px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--gray1);
  flex-shrink:0;
}
.rp-close{
  margin-left:auto;width:28px;height:28px;
  background:var(--gray1);border:none;border-radius:50%;
  cursor:pointer;font-size:14px;color:var(--gray4);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.rp-close:hover{background:var(--gray2);color:var(--ink);}
.rp-body{overflow-y:auto;flex:1;padding:16px 20px 24px;}

/* Verdict */
.verdict-big{
  border-radius:var(--r2);padding:16px 18px;
  margin-bottom:16px;
  display:flex;align-items:center;gap:14px;
}
.verdict-big.ok{background:var(--green-bg);border:1.5px solid var(--green-border);}
.verdict-big.warn{background:var(--amber-bg);border:1.5px solid var(--amber-border);}
.verdict-big.err{background:var(--red-bg);border:1.5px solid var(--red-border);}
.vb-emoji{font-size:32px;}
.vb-text{}
.vb-title{font-size:16px;font-weight:900;margin-bottom:3px;}
.verdict-big.ok .vb-title{color:var(--green);}
.verdict-big.warn .vb-title{color:var(--amber);}
.verdict-big.err .vb-title{color:var(--red);}
.vb-sub{font-size:12px;color:var(--gray4);line-height:1.6;}

/* Check rows — スコアカード形式 */
.score-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;margin-bottom:16px;
}
.score-card{
  border-radius:var(--r);padding:12px 14px;
  border:1.5px solid;
  position:relative;overflow:hidden;
}
.score-card.ok{background:var(--green-bg);border-color:var(--green-border);}
.score-card.warn{background:var(--amber-bg);border-color:var(--amber-border);}
.score-card.err{background:var(--red-bg);border-color:var(--red-border);}
.score-card.na{background:var(--gray1);border-color:var(--gray2);}
.sc-icon{font-size:11px;font-weight:700;letter-spacing:0.08em;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.score-card.ok .sc-icon{color:var(--green);}
.score-card.warn .sc-icon{color:var(--amber);}
.score-card.err .sc-icon{color:var(--red);}
.score-card.na .sc-icon{color:var(--gray4);}
.sc-name{font-size:11px;color:var(--gray4);margin-bottom:6px;}
.sc-values{display:flex;align-items:baseline;gap:4px;}
.sc-main{font-size:22px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;}
.score-card.ok .sc-main{color:var(--green);}
.score-card.warn .sc-main{color:var(--amber);}
.score-card.err .sc-main{color:var(--red);}
.score-card.na .sc-main{color:var(--gray3);}
.sc-limit{font-size:11px;color:var(--gray4);}
.sc-bar{height:4px;background:rgba(0,0,0,0.08);border-radius:2px;margin-top:6px;overflow:hidden;}
.sc-bar-fill{height:100%;border-radius:2px;transition:width 0.8s cubic-bezier(0.34,1.2,0.64,1);}
.score-card.ok .sc-bar-fill{background:var(--green);}
.score-card.warn .sc-bar-fill{background:var(--amber);}
.score-card.err .sc-bar-fill{background:var(--red);}

/* Detail list */
.detail-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.detail-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;border-radius:var(--r);
  border:1px solid;font-size:12px;
}
.detail-item.ok{background:var(--green-bg);border-color:var(--green-border);}
.detail-item.warn{background:var(--amber-bg);border-color:var(--amber-border);}
.detail-item.err{background:var(--red-bg);border-color:var(--red-border);}
.detail-item.info{background:var(--blue-bg);border-color:#c0d4f8;}
.di-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.di-body{}
.di-title{font-weight:700;margin-bottom:2px;}
.detail-item.ok .di-title{color:var(--green);}
.detail-item.warn .di-title{color:var(--amber);}
.detail-item.err .di-title{color:var(--red);}
.detail-item.info .di-title{color:var(--blue);}
.di-text{color:var(--gray4);line-height:1.6;}
.di-law{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--gray3);margin-top:3px;}

/* Alert callout */
.alert-callout{
  background:#fffbf0;border:1.5px solid var(--amber-border);
  border-radius:var(--r);padding:12px 14px;
  margin-bottom:14px;
}
.ac-title{font-size:12px;font-weight:700;color:var(--amber);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.ac-items{font-size:11px;color:#8a6010;line-height:1.8;}

/* Export */
.export-btn{
  width:100%;height:44px;
  background:var(--gray1);border:1.5px solid var(--gray2);
  border-radius:var(--r2);font-size:13px;font-weight:600;
  font-family:'Noto Sans JP',sans-serif;
  cursor:pointer;color:var(--gray4);
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all 0.15s;margin-top:4px;
}
.export-btn:hover{background:var(--ink);color:white;border-color:var(--ink);}

/* Toast */
.toast{
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
  z-index:500;
  background:rgba(22,20,15,0.9);color:white;
  padding:10px 20px;border-radius:20px;
  font-size:12px;font-weight:500;
  opacity:0;transition:opacity 0.2s;
  pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;}

/* Leaflet UI */
.leaflet-control-zoom{border-radius:var(--r) !important;border:1px solid var(--gray2) !important;box-shadow:var(--shadow) !important;}
.leaflet-control-zoom a{border-radius:0 !important;font-size:16px !important;color:var(--ink) !important;border-bottom:1px solid var(--gray2) !important;}
.leaflet-control-zoom a:hover{background:var(--gray1) !important;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--gray2);border-radius:2px;}
</style>
</head>
<body>

<!-- Map -->
<div id="map"></div>

<!-- Top bar -->
<div class="topbar">
  <div class="tb-logo">建築法規チェック<span>かんたん版</span></div>
  <div class="search-bar">
    <input class="search-input" id="search" placeholder="🔍 住所・地名で検索..." onkeydown="if(event.key==='Enter')doSearch()" oninput="onSearchInput()">
    <button class="search-go" onclick="doSearch()">→</button>
    <div class="search-drop" id="search-drop"></div>
  </div>
  <div class="tb-hint">
    <div class="tb-pulse" id="tb-pulse"></div>
    <span id="tb-hint-text">地図をタップして開始</span>
  </div>
</div>

<!-- Fetching badge -->
<div class="fetching-badge" id="fetching-badge">
  <div class="fb-spin"></div>
  <span id="fetching-text">用途地域を取得中...</span>
</div>

<!-- Zone card -->
<div class="zone-card" id="zone-card">
  <div class="zc-head">
    <div class="zc-icon" id="zc-icon">🏘️</div>
    <div>
      <div class="zc-label">用途地域 — 自動取得</div>
      <div class="zc-name" id="zc-name">—</div>
    </div>
  </div>
  <div class="zc-params" id="zc-params"></div>
  <div class="zc-ai-note" id="zc-ai-note" style="display:none;">⚠️ AI推定値です — 自治体で確認を</div>
</div>

<!-- Input panel -->
<div class="input-panel" id="input-panel">
  <div class="ip-head">
    <span style="font-size:20px;">📐</span>
    <div>
      <div class="ip-title">建物の大きさを入力</div>
      <div class="ip-sub">3項目だけでチェックできます</div>
    </div>
  </div>
  <div class="ip-body">

    <div class="ip-field">
      <div class="ip-label"><span class="ip-label-icon">⬛</span>敷地面積</div>
      <div class="big-input-wrap">
        <input class="big-input" type="number" id="site-area" placeholder="300" min="1" oninput="calcLive()">
        <span class="big-unit">m²</span>
      </div>
    </div>

    <div class="ip-field">
      <div class="ip-label"><span class="ip-label-icon">🏢</span>建物の面積・高さ</div>
      <div class="sub-inputs">
        <div>
          <div class="sub-label">建築面積</div>
          <input class="sub-input" type="number" id="build-area" placeholder="150" oninput="calcLive()">
          <div class="sub-unit">m²</div>
        </div>
        <div>
          <div class="sub-label">延床面積</div>
          <input class="sub-input" type="number" id="floor-area" placeholder="600" oninput="calcLive()">
          <div class="sub-unit">m²</div>
        </div>
        <div>
          <div class="sub-label">建物高さ</div>
          <input class="sub-input" type="number" id="height" placeholder="20" step="0.5" oninput="calcLive()">
          <div class="sub-unit">m</div>
        </div>
        <div>
          <div class="sub-label">前面道路幅</div>
          <input class="sub-input" type="number" id="road-w" placeholder="6" step="0.1">
          <div class="sub-unit">m</div>
        </div>
      </div>
    </div>

    <!-- ライブプレビュー -->
    <div id="live-preview" style="display:none;background:var(--gray1);border-radius:var(--r);padding:10px 12px;margin-bottom:4px;">
      <div style="font-size:10px;color:var(--gray4);margin-bottom:6px;font-weight:700;letter-spacing:0.08em;">リアルタイム計算</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
        <div id="live-bcr" style="font-size:12px;"></div>
        <div id="live-far" style="font-size:12px;"></div>
      </div>
    </div>

    <button class="run-btn" id="run-btn" onclick="runCheck()">
      ⚖️ チェックする
    </button>
  </div>
</div>

<!-- Step guide -->
<div class="step-guide" id="step-guide">
  <span class="sg-icon" id="sg-icon">📍</span>
  <div>
    <div class="sg-text" id="sg-text">地図をタップして敷地の場所を指定</div>
    <div class="sg-sub" id="sg-sub">ピンを置くだけで用途地域が自動でわかります</div>
  </div>
</div>

<div class="result-panel" id="result-panel">
  <div class="rp-handle" onclick="closeResult()"></div>
  <div class="rp-head">
    <span style="font-size:20px;">📊</span>
    <div>
      <div style="font-size:14px;font-weight:700;" id="rp-title">チェック結果</div>
      <div style="font-size:11px;color:var(--gray4);" id="rp-zone-label"></div>
    </div>
    <button class="rp-close" onclick="closeResult()">✕</button>
  </div>
  <div class="rp-body" id="rp-body"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ════ 用途地域データ ════
const ZDB = {
  '第一種低層住居専用地域': { far:100, bcr:40, maxH:10, shadow:true, roadK:1.25, north:true, uses:['専用住宅','共同住宅'], icon:'🏡', color:'#bcd8f5' },
  '第二種低層住居専用地域': { far:150, bcr:40, maxH:10, shadow:true, roadK:1.25, north:true, uses:['専用住宅','共同住宅','店舗'], icon:'🏡', color:'#c8e0f8' },
  '第一種中高層住居専用地域': { far:200, bcr:60, maxH:null, shadow:true, roadK:1.25, north:true, uses:['専用住宅','共同住宅','事務所'], icon:'🏘️', color:'#9ec8f0' },
  '第二種中高層住居専用地域': { far:200, bcr:60, maxH:null, shadow:true, roadK:1.25, north:true, uses:['専用住宅','共同住宅','事務所','店舗'], icon:'🏘️', color:'#aad0f5' },
  '第一種住居地域': { far:200, bcr:60, maxH:null, shadow:true, roadK:1.25, north:false, uses:['全用途'], icon:'🏠', color:'#78b4e8' },
  '第二種住居地域': { far:200, bcr:60, maxH:null, shadow:true, roadK:1.25, north:false, uses:['全用途'], icon:'🏠', color:'#88bce8' },
  '準住居地域': { far:200, bcr:60, maxH:null, shadow:false, roadK:1.5, north:false, uses:['全用途'], icon:'🏬', color:'#a0c8f0' },
  '近隣商業地域': { far:200, bcr:80, maxH:null, shadow:false, roadK:1.5, north:false, uses:['全用途'], icon:'🏪', color:'#f5d060' },
  '商業地域': { far:400, bcr:80, maxH:null, shadow:false, roadK:1.5, north:false, uses:['全用途'], icon:'🏙️', color:'#f5c030' },
  '準工業地域': { far:200, bcr:60, maxH:null, shadow:false, roadK:1.5, north:false, uses:['全用途'], icon:'🏭', color:'#f5b080' },
  '工業地域': { far:200, bcr:60, maxH:null, shadow:false, roadK:1.5, north:false, uses:['工場'], icon:'🏭', color:'#f09060' },
  '工業専用地域': { far:200, bcr:60, maxH:null, shadow:false, roadK:1.5, north:false, uses:['工場'], icon:'⚙️', color:'#e87050' },
};

// ════ State ════
const S = { lat:null, lng:null, zone:null, zd:null, isAI:false, marker:null, zoneCircle:null, lastResult:null };

// ════ Map Setup ════
const map = L.map('map', { zoomControl:true, attributionControl:true }).setView([35.18, 136.9], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© OpenStreetMap', maxZoom:19
}).addTo(map);
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
  attribution:'© 国土地理院', maxZoom:18, opacity:0.4
}).addTo(map);

// ════ Map Click ════
map.on('click', async e => {
  await handlePin(e.latlng.lat, e.latlng.lng);
});

async function handlePin(lat, lng) {
  S.lat = lat; S.lng = lng;

  // マーカー設置
  if (S.marker) map.removeLayer(S.marker);
  const icon = L.divIcon({
    html:`<div style="width:32px;height:44px;position:relative;">
      <div style="width:32px;height:32px;background:#c03028;border:3px solid white;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 3px 12px rgba(192,48,40,0.5);"></div>
    </div>`,
    className:'', iconSize:[32,44], iconAnchor:[16,44]
  });
  S.marker = L.marker([lat,lng],{icon}).addTo(map);

  // ガイド更新
  setGuide('📡','用途地域を取得中...','しばらくお待ちください');
  setHint('取得中...','loading');
  showFetching('用途地域を自動取得中...');
  document.getElementById('zone-card').classList.remove('show');

  // 取得
  await fetchZone(lat, lng);
}

// ════ 用途地域取得（3段階フォールバック） ════
async function fetchZone(lat, lng) {
  // ① 国土交通省 不動産情報ライブラリ
  try {
    const r = await fetch(`https://www.reinfolib.mlit.go.jp/ex-api/external/XKT010?response_format=geojson&lat=${lat}&lon=${lng}`, {
      headers:{'Ocp-Apim-Subscription-Key':''}
    });
    if (r.ok) {
      const d = await r.json();
      if (d.features?.length) {
        const p = d.features[0].properties;
        const YOTO = {1:'第一種低層住居専用地域',2:'第二種低層住居専用地域',3:'第一種中高層住居専用地域',4:'第二種中高層住居専用地域',5:'第一種住居地域',6:'第二種住居地域',7:'準住居地域',8:'近隣商業地域',9:'商業地域',10:'準工業地域',11:'工業地域',12:'工業専用地域'};
        const name = YOTO[parseInt(p.yoto||p.A29_004)] || p.yoto_name;
        if (name && ZDB[name]) { applyZone(name, false); return; }
      }
    }
  } catch(e) {}

  // ② 国土数値情報
  try {
    const r2 = await fetch(`https://geoshape.ex.nii.ac.jp/geoapi/api/3/action/datastore_search?resource_id=A29-11_GML&lat=${lat}&lon=${lng}&limit=1`);
    if (r2.ok) {
      const d2 = await r2.json();
      const rec = d2.result?.records?.[0];
      if (rec) {
        const name = rec['A29_004_name'] || rec['用途地域'];
        if (name && ZDB[name]) { applyZone(name, false); return; }
      }
    }
  } catch(e) {}

  // ③ AI推定
  await aiEstimateZone(lat, lng);
}

async function aiEstimateZone(lat, lng) {
  setFetchingText('AIで用途地域を推定中...');
  let addr = '';
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ja`);
    const d = await r.json();
    addr = d.display_name || '';
  } catch(e) {}

  try {
    const prompt = `緯度${lat.toFixed(5)} 経度${lng.toFixed(5)} 住所:${addr} の用途地域をJSONのみで答えてください:
{"zone":"第X種XX地域","far":数値,"bcr":数値,"note":"1文"}
選択肢:第一種低層住居専用地域,第二種低層住居専用地域,第一種中高層住居専用地域,第二種中高層住居専用地域,第一種住居地域,第二種住居地域,準住居地域,近隣商業地域,商業地域,準工業地域,工業地域,工業専用地域`;
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const raw = data.content.map(c=>c.text||'').join('');
    const m = raw.match(/\{[\s\S]*?\}/);
    if (m) {
      const p = JSON.parse(m[0]);
      if (ZDB[p.zone]) { applyZone(p.zone, true, p.note); return; }
    }
  } catch(e) {}

  // 全失敗 → 手動選択へ
  hideFetching();
  setGuide('🤔','取得できませんでした','下から用途地域を選んでください');
  setHint('手動選択が必要','err');
  showManualZonePicker();
}

// ════ 用途地域適用 ════
function applyZone(zoneName, isAI, note='') {
  S.zone = zoneName;
  S.zd = ZDB[zoneName];
  S.isAI = isAI;
  hideFetching();

  // 地図に円
  if (S.zoneCircle) map.removeLayer(S.zoneCircle);
  S.zoneCircle = L.circle([S.lat, S.lng], {
    radius:60, color:S.zd.color, fillColor:S.zd.color,
    fillOpacity:0.45, weight:2, opacity:0.8
  }).addTo(map);

  // Zone card
  document.getElementById('zc-icon').textContent = S.zd.icon;
  document.getElementById('zc-name').textContent = zoneName;
  document.getElementById('zc-params').innerHTML = `
    <div class="zc-param"><div class="zcp-label">容積率</div><div class="zcp-val">${S.zd.far}%</div></div>
    <div class="zc-param"><div class="zcp-label">建蔽率</div><div class="zcp-val">${S.zd.bcr}%</div></div>
    <div class="zc-param"><div class="zcp-label">高さ制限</div><div class="zcp-val">${S.zd.maxH?S.zd.maxH+'m':'なし'}</div></div>
    <div class="zc-param"><div class="zcp-label">日影規制</div><div class="zcp-val">${S.zd.shadow?'対象':'なし'}</div></div>
  `;
  const aiNote = document.getElementById('zc-ai-note');
  aiNote.style.display = isAI ? 'flex' : 'none';
  document.getElementById('zone-card').classList.add('show');

  // Input panel表示
  document.getElementById('input-panel').classList.add('show');

  // ガイド更新
  setGuide('📐','建物の大きさを入力してください','面積と高さを入力したら「チェックする」を押してください');
  setHint(`${zoneName}`, 'ok');
  toast(`📍 ${zoneName}${isAI?' (AI推定)':''}`);
}

// ════ ライブ計算 ════
function calcLive() {
  const site = parseFloat(document.getElementById('site-area').value);
  const build = parseFloat(document.getElementById('build-area').value);
  const floor = parseFloat(document.getElementById('floor-area').value);
  if (!S.zd || !site || (!build && !floor)) { document.getElementById('live-preview').style.display='none'; return; }
  const bcr = build ? (build/site*100) : null;
  const far = floor ? (floor/site*100) : null;
  const prev = document.getElementById('live-preview');
  prev.style.display = 'block';

  const bcrOk = bcr ? bcr <= S.zd.bcr : null;
  const farOk = far ? far <= S.zd.far : null;
  document.getElementById('live-bcr').innerHTML = bcr ? `<span style="font-weight:700;font-family:'JetBrains Mono',monospace;color:${bcrOk?'var(--green)':'var(--red)'};">${bcr.toFixed(1)}%</span><span style="font-size:10px;color:var(--gray4);"> / ${S.zd.bcr}% 建蔽</span>` : '';
  document.getElementById('live-far').innerHTML = far ? `<span style="font-weight:700;font-family:'JetBrains Mono',monospace;color:${farOk?'var(--green)':'var(--red)'};">${far.toFixed(1)}%</span><span style="font-size:10px;color:var(--gray4);"> / ${S.zd.far}% 容積</span>` : '';
}

// ════ チェック実行 ════
async function runCheck() {
  if (!S.zone) { toast('まず地図をタップして敷地を指定してください'); return; }
  const siteArea  = parseFloat(document.getElementById('site-area').value);
  const buildArea = parseFloat(document.getElementById('build-area').value);
  const floorArea = parseFloat(document.getElementById('floor-area').value);
  const height    = parseFloat(document.getElementById('height').value) || 0;
  const roadW     = parseFloat(document.getElementById('road-w').value) || 0;
  if (!siteArea||!buildArea||!floorArea) { toast('敷地面積・建築面積・延床面積を入力してください'); return; }

  const btn = document.getElementById('run-btn');
  btn.disabled=true; btn.innerHTML='<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:sp 0.7s linear infinite;"></span> 計算中...';

  const z = S.zd;
  const bcrLim = z.bcr, farLim = z.far;
  const roadFAR = roadW>0 ? roadW*4*10 : farLim;
  const effFAR  = Math.min(farLim, roadFAR);
  const actualBCR = buildArea/siteArea*100;
  const actualFAR = floorArea/siteArea*100;
  const roadSlope = roadW>0 ? roadW*z.roadK : null;

  const bcrOk = actualBCR <= bcrLim;
  const farOk = actualFAR <= effFAR;
  const hOk   = z.maxH ? height<=z.maxH : true;
  const rsOk  = roadSlope ? height<=roadSlope : true;

  // AI チェック
  let aiResult = null;
  try {
    const prompt = `建築法規の専門家として以下をチェックし、JSONのみで返してください:
用途地域:${S.zone} 敷地:${siteArea}㎡ 建蔽:${actualBCR.toFixed(1)}%(上限${bcrLim}%) 容積:${actualFAR.toFixed(1)}%(有効上限${effFAR}%) 高さ:${height}m${roadSlope?' 道路斜線上限:'+roadSlope.toFixed(1)+'m':''} 日影:${z.shadow?'対象':'非対象'}
{"overall":"ok/warn/err","summary":"2文","alerts":["自治体確認事項"],"items":[{"type":"err/warn/ok/info","title":"項目","detail":"詳細","law":"法令"}]}`;
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const d = await res.json();
    const raw = d.content.map(c=>c.text||'').join('');
    const m = raw.match(/\{[\s\S]*\}/);
    if (m) aiResult = JSON.parse(m[0]);
  } catch(e) {}

  const overall = aiResult?.overall || (!bcrOk||!farOk ? 'err' : (!hOk||!rsOk) ? 'warn' : 'ok');
  S.lastResult = { zone:S.zone, siteArea, buildArea, floorArea, height, roadW, bcrLim, farLim, effFAR, roadFAR, actualBCR, actualFAR, bcrOk, farOk, hOk, rsOk, roadSlope, z, aiResult, overall };

  renderResult(S.lastResult);

  btn.disabled=false; btn.innerHTML='⚖️ チェックする';
  setGuide('📊','チェック完了！','下のパネルで結果を確認してください');
}

// ════ 結果描画 ════
function renderResult(R) {
  const overall = R.overall;
  const vEmoji = overall==='err'?'❌':overall==='warn'?'⚠️':'✅';
  const vTitle = overall==='err'?'不適合あり — 修正が必要です':overall==='warn'?'要確認事項があります':'法規に適合しています';
  const vSub = R.aiResult?.summary || '';

  document.getElementById('rp-title').textContent = vTitle;
  document.getElementById('rp-zone-label').textContent = `${R.zone} ／ 敷地 ${R.siteArea}㎡`;

  const bcrP = Math.min(R.actualBCR/R.bcrLim*100,130);
  const farP = Math.min(R.actualFAR/R.effFAR*100,130);
  const bcrCls = R.bcrOk?'ok':'err';
  const farCls = R.farOk?'ok':'err';
  const hCls = R.hOk&&R.rsOk?'ok':'warn';
  const shCls = R.z.shadow?'warn':'na';

  const alertsHTML = R.aiResult?.alerts?.length ? `
    <div class="alert-callout">
      <div class="ac-title">⚠️ 自治体・行政に確認が必要</div>
      <div class="ac-items">${R.aiResult.alerts.map((a,i)=>`${i+1}. ${a}`).join('<br>')}</div>
    </div>` : '';

  const aiDetailsHTML = R.aiResult?.items?.length ? `
    <div style="font-size:10px;font-weight:700;color:var(--gray4);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;">AIによる詳細チェック</div>
    <div class="detail-list">
      ${R.aiResult.items.map(it=>`
        <div class="detail-item ${it.type}">
          <div class="di-icon">${it.type==='err'?'❌':it.type==='warn'?'⚠️':it.type==='ok'?'✅':'ℹ️'}</div>
          <div class="di-body">
            <div class="di-title">${it.title}</div>
            <div class="di-text">${it.detail||''}</div>
            ${it.law?`<div class="di-law">📖 ${it.law}</div>`:''}
          </div>
        </div>`).join('')}
    </div>` : '';

  document.getElementById('rp-body').innerHTML = `
    <div class="verdict-big ${overall}">
      <div class="vb-emoji">${vEmoji}</div>
      <div class="vb-text">
        <div class="vb-title">${vTitle}</div>
        <div class="vb-sub">${vSub}</div>
      </div>
    </div>

    <div class="score-grid">
      <div class="score-card ${bcrCls}">
        <div class="sc-icon">${R.bcrOk?'✅':'❌'} 建蔽率</div>
        <div class="sc-values">
          <span class="sc-main">${R.actualBCR.toFixed(1)}</span>
          <span class="sc-limit">% / 上限${R.bcrLim}%</span>
        </div>
        <div class="sc-bar"><div class="sc-bar-fill" style="width:${bcrP}%"></div></div>
      </div>
      <div class="score-card ${farCls}">
        <div class="sc-icon">${R.farOk?'✅':'❌'} 容積率</div>
        <div class="sc-values">
          <span class="sc-main">${R.actualFAR.toFixed(1)}</span>
          <span class="sc-limit">% / 上限${R.effFAR}%</span>
        </div>
        <div class="sc-bar"><div class="sc-bar-fill" style="width:${farP}%"></div></div>
      </div>
      <div class="score-card ${hCls}">
        <div class="sc-icon">${R.hOk&&R.rsOk?'✅':'⚠️'} 高さ・斜線</div>
        <div class="sc-values">
          <span class="sc-main">${R.height||'—'}</span>
          <span class="sc-limit">m${R.roadSlope?' / 斜線'+R.roadSlope.toFixed(0)+'m':''}</span>
        </div>
        ${R.z.maxH?`<div style="font-size:10px;color:var(--gray4);margin-top:4px;">絶対高さ上限 ${R.z.maxH}m</div>`:''}
      </div>
      <div class="score-card ${shCls}">
        <div class="sc-icon">${R.z.shadow?'⚠️':'✅'} 日影規制</div>
        <div class="sc-values">
          <span class="sc-main" style="font-size:14px;">${R.z.shadow?'対象':'なし'}</span>
        </div>
        ${R.z.shadow?`<div style="font-size:10px;color:var(--amber);margin-top:4px;">冬至の日影計算が必要</div>`:''}
      </div>
    </div>

    ${alertsHTML}
    ${aiDetailsHTML}

    <button class="export-btn" onclick="exportReport()">📄 レポートを保存する</button>
    <div style="font-size:10px;color:var(--gray3);text-align:center;margin-top:10px;line-height:1.7;">
      本結果はAI参考情報です。建築確認申請前に建築士・自治体窓口で確認してください。
    </div>`;

  document.getElementById('result-panel').classList.add('show');
}

function closeResult() {
  document.getElementById('result-panel').classList.remove('show');
}

// ════ 手動ゾーン選択（フォールバック） ════
function showManualZonePicker() {
  const names = Object.keys(ZDB);
  // ガイドエリアに直接インライン表示
  const sg = document.getElementById('step-guide');
  sg.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="font-size:11px;color:rgba(255,255,255,0.6);margin-bottom:2px;">用途地域を選んでください</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;max-width:600px;">
        ${names.map(n=>`<button onclick="applyZone('${n}',true,'手動選択')" style="padding:5px 10px;border:1px solid rgba(255,255,255,0.25);border-radius:12px;background:rgba(255,255,255,0.1);color:white;font-size:10px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all 0.1s;" onmouseover="this.style.background='rgba(255,255,255,0.22)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">${n.replace('住居専用','住専').replace('地域','')}</button>`).join('')}
      </div>
    </div>`;
}

// ════ 住所検索 ════
let searchTimer = null;
function onSearchInput() {
  clearTimeout(searchTimer);
  const q = document.getElementById('search').value.trim();
  if (q.length < 2) { document.getElementById('search-drop').style.display='none'; return; }
  searchTimer = setTimeout(() => doSearch(), 600);
}
async function doSearch() {
  const q = document.getElementById('search').value.trim();
  if (!q) return;
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&countrycodes=jp&format=json&limit=5`,{headers:{'Accept-Language':'ja'}});
    const d = await r.json();
    const drop = document.getElementById('search-drop');
    if (!d.length) { drop.style.display='none'; return; }
    drop.style.display='block';
    drop.innerHTML = d.map(item=>`
      <div class="search-item" onclick="gotoSearch(${item.lat},${item.lon},'${item.display_name.slice(0,60).replace(/'/g,"\\'")}')">
        <div class="si-name">📍 ${item.display_name.slice(0,55)}</div>
        <div class="si-addr">${parseFloat(item.lat).toFixed(5)}, ${parseFloat(item.lon).toFixed(5)}</div>
      </div>`).join('');
  } catch(e) {}
}
async function gotoSearch(lat,lng,name) {
  map.setView([lat,lng],17);
  document.getElementById('search').value = name.slice(0,50);
  document.getElementById('search-drop').style.display='none';
  await handlePin(parseFloat(lat), parseFloat(lng));
}
document.addEventListener('click', e => {
  if (!e.target.closest('.search-bar')) document.getElementById('search-drop').style.display='none';
});

// ════ Utils ════
function setGuide(icon,text,sub) {
  document.getElementById('sg-icon').textContent=icon;
  document.getElementById('sg-text').textContent=text;
  document.getElementById('sg-sub').textContent=sub;
  // ガイドを元の形に戻す（手動選択後など）
  const sg=document.getElementById('step-guide');
  sg.innerHTML=`<span class="sg-icon" id="sg-icon">${icon}</span><div><div class="sg-text" id="sg-text">${text}</div><div class="sg-sub" id="sg-sub">${sub}</div></div>`;
}
function setHint(text,type) {
  document.getElementById('tb-hint-text').textContent=text;
  const d=document.getElementById('tb-pulse');
  d.className='tb-pulse'+(type==='loading'?' loading':type==='err'?' err':'');
}
function showFetching(text) {
  document.getElementById('fetching-badge').classList.add('show');
  document.getElementById('fetching-text').textContent=text;
}
function setFetchingText(text) { document.getElementById('fetching-text').textContent=text; }
function hideFetching() { document.getElementById('fetching-badge').classList.remove('show'); }
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}
